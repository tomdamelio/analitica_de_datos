# ---------------------------------------------------------------------------
# Build + deploy del sitio a GitHub Pages.
# ESTADO: listo pero inerte — el remoto todavía no existe. Al crear el repo:
#   1. Settings → Pages → Source: "GitHub Actions".
#   2. Push a main dispara este workflow.
# Gracias a `freeze: auto`, el CI NO ejecuta código (ni Python ni R): publica
# los outputs congelados en _freeze/ y las notebooks ya ejecutadas. Por eso
# NO se instalan kernels acá.
# ---------------------------------------------------------------------------
name: Publicar sitio en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.38

      # Solo para el ipynb-filter (scripts/strip_scaffold_filter.py); las
      # notebooks NO se ejecutan en CI.
      - name: Instalar Python (requerido por el ipynb-filter)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Regenera el mapa del Programa enlazando las clases que ya tienen página.
      # Va ANTES del render porque Quarto expande los includes al armar el proyecto.
      - name: Generar mapa del Programa
        run: python scripts/gen_mapa.py

      - name: Render del sitio (freeze, sin ejecutar código)
        run: quarto render

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
