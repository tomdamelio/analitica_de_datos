# ---------------------------------------------------------------------------
# PARAMETRIZACIÓN CENTRAL (único lugar donde se define <owner>/<repo>/<branch>)
# ---------------------------------------------------------------------------
# Si el repo cambia de nombre/dueño/rama, editar SOLO este archivo y re-renderizar.
# Las notebooks .ipynb llevan la URL ya resuelta (no leen variables Quarto):
# al cambiar esto, regenerar sus badges con el mismo valor.
# Los badges apuntan al ESPEJO PUBLICO de notebooks (el repo principal es privado
# y Colab solo abre notebooks de repos publicos). El workflow de publicacion
# sincroniza las notebooks al espejo en cada push (job mirror-notebooks).
colab-owner-repo: "tomdamelio/analitica-de-datos-notebooks"
colab-branch: "main"
# Raíz compuesta para badges "Open in Colab":
colab-root: "https://colab.research.google.com/github/tomdamelio/analitica-de-datos-notebooks/blob/main"
# URL del sitio publicado (GitHub Pages):
site-url: "https://tomdamelio.github.io/analitica_de_datos"
