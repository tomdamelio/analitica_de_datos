project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "clases/**/*.qmd"
    - "clases/**/*.ipynb"
    - "!context/"
  resources:
    - theme/udesa-logo-blanco.png
    - CNAME

lang: es

website:
  title: "Analítica de Datos"
  description: "Analítica de Datos, Maestría en Ciencias del Comportamiento, Universidad de San Andrés"
  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Inicio
      - href: programa.qmd
        text: Programa
      - href: bibliografia.qmd
        text: Bibliografía
      - text: Clases
        menu:
          - href: clases/clase-02/index.qmd
            text: "Clase 2: Análisis exploratorio y procesamiento de datos"
          - href: clases/clase-10/index.qmd
            text: "Clase 10: Reducción de dimensionalidad"
    right:
      # Logo UdeSA en blanco (derivado del SVG oficial; ver theme/) -> Campus Virtual
      - text: '<img src="/theme/udesa-logo-blanco.png" alt="Campus Virtual UdeSA" style="height:24px; vertical-align:middle;">'
        href: "http://campusvirtual.udesa.edu.ar"
  page-footer:
    left: "Analítica de Datos, Maestría en Ciencias del Comportamiento, UdeSA, Primavera 2026"
    right: "Hecho con [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - cosmo
      - theme/udesa.scss
    toc: true
    toc-title: "En esta página"
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

execute:
  freeze: auto

# La metadata `scaffold` de las celdas solution (CONVENTIONS.md seccion 7) rompe
# la serializacion de atributos de Quarto; este filtro la quita SOLO del render.
# El .ipynb fuente no se modifica.
ipynb-filters:
  - scripts/strip_scaffold_filter.py
